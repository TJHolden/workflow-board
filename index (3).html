<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;padding:1.5rem}
h1{display:none}
.top-nav{display:flex;gap:8px;margin-bottom:1rem;border-bottom:1px solid #e0ddd6;padding-bottom:0.75rem;align-items:center}
.tab-btn{font-size:13px;padding:5px 16px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#666;cursor:pointer}
.tab-btn.active{background:#185FA5;color:#fff;border-color:#185FA5}
.tab-btn:hover:not(.active){background:#f0ede8}
.sync-status{margin-left:auto;font-size:11px;color:#999;display:flex;align-items:center;gap:5px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc}
.sync-dot.ok{background:#639922}
.sync-dot.busy{background:#EF9F27}
.sync-dot.err{background:#E24B4A}
.section{display:none}.section.active{display:block}
.toolbar{display:flex;gap:7px;margin-bottom:0.875rem;flex-wrap:wrap;align-items:center}
.toolbar input{font-size:13px;padding:6px 10px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a}
.toolbar input.grow{flex:1;min-width:120px}
.toolbar input.sm{width:75px}
.toolbar input.md{width:160px}
.toolbar button{font-size:13px;padding:6px 13px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;white-space:nowrap}
.toolbar button:hover{background:#f0ede8}
.import-btn{color:#185FA5;border-color:#B5D4F4}
.board{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;align-items:stretch}
.col{border:1px solid #e0ddd6;border-radius:12px;padding:12px;display:flex;flex-direction:column}
.col-travis{background:#FFF3E6;border-color:#FAC775}
.col-unassigned{background:#F4F3F0;border-color:#D3D1C7}
.col-tyler{background:#E6F1FB;border-color:#B5D4F4}
.col.drag-over{opacity:0.82}
.col-header{font-size:11px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid rgba(0,0,0,0.08);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.col-travis .col-header{color:#854F0B}
.col-unassigned .col-header{color:#5F5E5A}
.col-tyler .col-header{color:#185FA5}
.cpill{font-size:11px;border-radius:99px;padding:1px 8px}
.col-travis .cpill{background:#FAC775;color:#633806}
.col-unassigned .cpill{background:#D3D1C7;color:#444441}
.col-tyler .cpill{background:#B5D4F4;color:#0C447C}
.col-cards{flex:1}
.card{background:#fff;border:1px solid #e8e6e0;border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:grab;user-select:none}
.card:active{cursor:grabbing;opacity:0.6}
.card-name{font-size:13px;font-weight:500;color:#1a1a1a;text-align:center;margin-bottom:5px;line-height:1.35}
.card-dates{font-size:12px;color:#777;text-align:center;margin-bottom:7px}
.card-pills{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:9px}
.tag{font-size:11px;padding:2px 8px;border-radius:99px;border:1px solid #e0ddd6;color:#666;background:#f5f5f3;white-space:nowrap}
.card-footer{display:flex;justify-content:flex-end;gap:6px;border-top:1px solid #f0ede8;padding-top:7px}
.card-footer button{font-size:11px;padding:3px 10px;border-radius:99px;border:1px solid #e0ddd6;background:#f5f5f3;color:#666;cursor:pointer}
.card-footer .done-btn:hover{background:#EAF3DE;color:#3B6D11;border-color:#C0DD97}
.card-footer .del-btn:hover{background:#FCEBEB;color:#A32D2D;border-color:#F7C1C1}
.empty-hint{font-size:12px;color:#bbb;text-align:center;padding:2.5rem 0}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border:1px solid #ddd;border-radius:12px;padding:1.25rem;width:460px;max-width:95vw}
.modal h3{font-size:15px;font-weight:500;margin-bottom:0.4rem}
.modal p{font-size:12px;color:#666;margin-bottom:0.75rem;line-height:1.65}
.modal textarea{width:100%;height:150px;font-size:12px;font-family:monospace;padding:8px;border:1px solid #ddd;border-radius:8px;background:#f9f9f9;color:#1a1a1a;resize:vertical}
.modal-actions{display:flex;gap:8px;margin-top:0.75rem;justify-content:flex-end}
.modal-actions button{font-size:13px;padding:6px 14px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer}
.modal-actions .primary{background:#185FA5;color:#fff;border-color:#185FA5}
.modal-actions .primary:hover{background:#0C447C}
.drop-zone{border:2px dashed #ccc;border-radius:8px;padding:0.75rem;text-align:center;font-size:12px;color:#888;margin-bottom:0.75rem;cursor:pointer}
.drop-zone:hover{background:#f5f5f3}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.stat-card{background:#fff;border:1px solid #e8e6e0;border-radius:8px;padding:0.875rem;text-align:center}
.stat-label{font-size:11px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.04em}
.stat-val{font-size:22px;font-weight:500;color:#1a1a1a}
.filter-row{display:flex;gap:8px;margin-bottom:0.75rem;align-items:center;flex-wrap:wrap}
.filter-row label{font-size:12px;color:#666}
.filter-row select,.filter-row input{font-size:12px;padding:5px 8px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a}
.comp-table{width:100%;border-collapse:collapse;font-size:13px}
.comp-table th{font-size:11px;font-weight:500;color:#888;text-align:left;padding:6px 10px;border-bottom:1px solid #e8e6e0;white-space:nowrap}
.comp-table td{padding:7px 10px;border-bottom:1px solid #f0ede8;color:#1a1a1a;vertical-align:middle}
.comp-table tr:last-child td{border-bottom:none}
.ob{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500}
.ob-travis{background:#FEE8CC;color:#854F0B}
.ob-tyler{background:#B5D4F4;color:#0C447C}
.ob-unassigned{background:#D3D1C7;color:#444441}
.restore-btn{font-size:11px;padding:2px 8px;border:1px solid #ddd;border-radius:4px;background:#f5f5f3;color:#666;cursor:pointer}
.restore-btn:hover{background:#fff}
.empty-comp{font-size:13px;color:#aaa;text-align:center;padding:3rem 0}
</style>
</head>
<body>
<div id="app">
  <div class="top-nav">
    <button class="tab-btn active" onclick="showTab('board')">Board</button>
    <button class="tab-btn" onclick="showTab('completed')">Completed</button>
    <div class="sync-status"><div class="sync-dot busy" id="sync-dot"></div><span id="sync-label">Connecting...</span></div>
  </div>

  <div class="section active" id="sec-board">
    <div class="toolbar">
      <input class="grow" type="text" id="new-name" placeholder="Project name..." />
      <input class="md" type="text" id="new-dates" placeholder="Dates (e.g. Mar 4 – Mar 18, 2026)" />
      <input class="sm" type="text" id="new-n" placeholder="n=" />
      <button id="add-btn">+ Add</button>
      <button class="import-btn" onclick="openImport()">Import CSV / Sheet</button>
    </div>
    <div class="board" id="board"></div>
  </div>

  <div class="section" id="sec-completed">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="filter-row">
      <label>Period:</label>
      <select id="comp-period" onchange="renderCompleted()">
        <option value="all">All time</option>
        <option value="month">This month</option>
        <option value="year">This year</option>
        <option value="custom">Custom month</option>
      </select>
      <input type="month" id="comp-month" style="display:none" onchange="renderCompleted()" />
      <select id="comp-owner" onchange="renderCompleted()">
        <option value="all">Everyone</option>
        <option value="tyler">Tyler</option>
        <option value="travis">Travis</option>
        <option value="unassigned">Unassigned</option>
      </select>
      <input type="text" id="comp-search" placeholder="Search..." style="width:140px" oninput="renderCompleted()" />
    </div>
    <div id="comp-content"></div>
  </div>

  <div class="modal-bg" id="import-modal">
    <div class="modal">
      <h3>Import from spreadsheet</h3>
      <p>Drop a .csv file, or copy cells from Excel / Google Sheets and paste.<br>Columns: <strong>Project name, Start date, End date, n, Universe</strong> — header row skipped.</p>
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">Drop .csv here or click to browse<input type="file" id="file-input" accept=".csv,.tsv,.txt" style="display:none" onchange="handleFile(event)" /></div>
      <textarea id="paste-area" placeholder="Or paste spreadsheet cells here..."></textarea>
      <div class="modal-actions">
        <button onclick="closeImport()">Cancel</button>
        <button class="primary" onclick="doImport()">Import</button>
      </div>
    </div>
  </div>
</div>

<script>
const API_KEY = '$2a$10$Pi8PR61GPkMx1Q6cQnVYjeS9ORJlve7nQxznQ9YiM9MtziPiL58Cy';
const BIN_NAME = 'guidant-workflow-board';
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const now = new Date();

const SEED = [
  {n:"Indiana Statewide",dates:"Mar 4 – Mar 18, 2026",size:"1200",universe:"GE voters"},

  {n:"Pennsylvania SD 20",dates:"Mar 25 – Mar 29, 2026",size:"300",universe:"Primary voters"},
  {n:"Pennsylvania SD 48",dates:"Mar 25 – Mar 29, 2026",size:"300",universe:"Primary voters"},
  {n:"Georgia HD 114",dates:"Mar 26 – Mar 30, 2026",size:"300",universe:"Primary voters"},
  {n:"Georgia HD 120",dates:"Mar 26 – Mar 30, 2026",size:"300",universe:"Primary voters"},
  {n:"Georgia SD 19",dates:"Mar 27 – Mar 31, 2026",size:"300",universe:"Primary voters"},
  {n:"Georgia SD 27",dates:"Mar 27 – Mar 31, 2026",size:"300",universe:"Primary voters"},
  {n:"Georgia SD 42",dates:"Mar 30 – Apr 3, 2026",size:"300",universe:"Primary voters"},
  {n:"Georgia SD 46",dates:"Mar 30 – Apr 3, 2026",size:"300",universe:"Primary voters"},
  {n:"Georgia SD 51",dates:"Apr 1 – Apr 5, 2026",size:"300",universe:"Primary voters"},
  {n:"Texas HD 126 Primary Runoff",dates:"Apr 7 – Apr 11, 2026",size:"300",universe:"Primary runoff"},
  {n:"Alabama SD 10",dates:"Apr 7 – Apr 11, 2026",size:"300",universe:"Primary voters"},
];

let cards=[], completed=[], nextId=1, BIN_ID='', lastVersion=null;

function setSyncStatus(state, label) {
  document.getElementById('sync-dot').className = 'sync-dot' + (state ? ' ' + state : '');
  document.getElementById('sync-label').textContent = label;
}

async function init() {
  BIN_ID = localStorage.getItem('wb_bin_id') || '';
  if (BIN_ID) {
    const ok = await fetchBin();
    if (ok) { renderBoard(); setSyncStatus('ok', 'Synced'); setInterval(poll, 8000); return; }
  }
  const id = await createBin();
  if (id) {
    BIN_ID = id;
    localStorage.setItem('wb_bin_id', BIN_ID);
    renderBoard();
    setSyncStatus('ok', 'Synced');
    setInterval(poll, 8000);
  } else {
    setSyncStatus('err', 'Could not connect');
  }
}

async function createBin() {
  let id = 1;
  const data = { cards: SEED.map(p => ({...p, id: id++, col: 'unassigned'})), completed: [], nextId: id };
  cards = data.cards; completed = data.completed; nextId = data.nextId;
  try {
    const r = await fetch('https://api.jsonbin.io/v3/b', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY, 'X-Bin-Name': BIN_NAME },
      body: JSON.stringify(data)
    });
    const j = await r.json();
    return j.metadata && j.metadata.id ? j.metadata.id : null;
  } catch(e) { return null; }
}

async function fetchBin() {
  try {
    const r = await fetch('https://api.jsonbin.io/v3/b/' + BIN_ID + '/latest', { headers: { 'X-Master-Key': API_KEY } });
    if (!r.ok) return false;
    const j = await r.json();
    cards = j.record.cards || []; completed = j.record.completed || []; nextId = j.record.nextId || 1;
    lastVersion = j.metadata && j.metadata.version ? j.metadata.version : null;
    return true;
  } catch(e) { return false; }
}

async function saveBin() {
  setSyncStatus('busy', 'Saving...');
  try {
    const r = await fetch('https://api.jsonbin.io/v3/b/' + BIN_ID, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
      body: JSON.stringify({ cards, completed, nextId })
    });
    if (r.ok) {
      const j = await r.json();
      lastVersion = j.metadata && j.metadata.version ? j.metadata.version : null;
      setSyncStatus('ok', 'Synced');
    } else { setSyncStatus('err', 'Save failed'); }
  } catch(e) { setSyncStatus('err', 'Offline'); }
}

async function poll() {
  try {
    const r = await fetch('https://api.jsonbin.io/v3/b/' + BIN_ID + '/latest', { headers: { 'X-Master-Key': API_KEY } });
    if (!r.ok) return;
    const j = await r.json();
    const v = j.metadata && j.metadata.version ? j.metadata.version : null;
    if (v && v !== lastVersion) {
      cards = j.record.cards || []; completed = j.record.completed || []; nextId = j.record.nextId || 1;
      lastVersion = v;
      setSyncStatus('ok', 'Updated');
      const active = document.querySelector('.tab-btn.active');
      if (active && active.textContent === 'Board') renderBoard();
      else if (active && active.textContent === 'Completed') { renderStats(); renderCompleted(); }
    }
  } catch(e) {}
}

function showTab(t) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['board','completed'][i] === t));
  ['board','completed'].forEach(id => document.getElementById('sec-'+id).classList.toggle('active', id === t));
  if (t === 'completed') { renderStats(); renderCompleted(); }
}

let dragging = null;

function renderBoard() {
  const COLS = [
    {id:'travis', label:'Travis', cls:'col-travis'},
    {id:'unassigned', label:'Unassigned', cls:'col-unassigned'},
    {id:'tyler', label:'Tyler', cls:'col-tyler'},
  ];
  const board = document.getElementById('board');
  board.innerHTML = '';
  COLS.forEach(col => {
    const colCards = cards.filter(c => c.col === col.id);
    const el = document.createElement('div');
    el.className = 'col ' + col.cls; el.dataset.col = col.id;
    const hdr = document.createElement('div'); hdr.className = 'col-header';
    hdr.innerHTML = '<span>' + col.label + '</span><span class="cpill">' + colCards.length + '</span>';
    el.appendChild(hdr);
    const wrap = document.createElement('div'); wrap.className = 'col-cards';
    if (!colCards.length) { const h = document.createElement('div'); h.className = 'empty-hint'; h.textContent = 'Drop here'; wrap.appendChild(h); }
    colCards.forEach(card => {
      const c = document.createElement('div');
      c.className = 'card'; c.draggable = true; c.dataset.id = card.id;
      const nPill = card.size ? '<span class="tag">n=' + card.size + '</span>' : '';
      const uPill = card.universe ? '<span class="tag">' + card.universe + '</span>' : '';
      c.innerHTML = '<div class="card-name">' + card.n + '</div><div class="card-dates">' + (card.dates||'') + '</div><div class="card-pills">' + nPill + uPill + '</div><div class="card-footer"><button class="done-btn" data-id="' + card.id + '">Done</button><button class="del-btn" data-id="' + card.id + '">Remove</button></div>';
      c.addEventListener('dragstart', e => { dragging = card.id; e.dataTransfer.effectAllowed = 'move'; setTimeout(() => c.style.opacity = '0.45', 0); });
      c.addEventListener('dragend', () => { c.style.opacity = '1'; dragging = null; document.querySelectorAll('.col').forEach(x => x.classList.remove('drag-over')); });
      wrap.appendChild(c);
    });
    el.appendChild(wrap);
    el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
    el.addEventListener('dragleave', e => { if (!el.contains(e.relatedTarget)) el.classList.remove('drag-over'); });
    el.addEventListener('drop', e => {
      e.preventDefault(); el.classList.remove('drag-over');
      if (dragging != null) { const card = cards.find(c => c.id == dragging); if (card) { card.col = col.id; saveBin(); renderBoard(); } }
    });
    board.appendChild(el);
  });
  document.querySelectorAll('.done-btn').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); const card = cards.find(c => c.id == btn.dataset.id); if (card) { completed.push({...card, completedAt: new Date().toISOString()}); cards = cards.filter(c => c.id != btn.dataset.id); saveBin(); renderBoard(); } });
  });
  document.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); if (confirm('Remove this project?')) { cards = cards.filter(c => c.id != btn.dataset.id); saveBin(); renderBoard(); } });
  });
}

function renderStats() {
  const total = completed.length;
  const thisMonth = completed.filter(c => { const d = new Date(c.completedAt); return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear(); }).length;
  const thisYear = completed.filter(c => new Date(c.completedAt).getFullYear() === now.getFullYear()).length;
  const byTyler = completed.filter(c => c.col === 'tyler').length;
  const byTravis = completed.filter(c => c.col === 'travis').length;
  document.getElementById('stats-grid').innerHTML = '<div class="stat-card"><div class="stat-label">All time</div><div class="stat-val">' + total + '</div></div><div class="stat-card"><div class="stat-label">This month</div><div class="stat-val">' + thisMonth + '</div></div><div class="stat-card"><div class="stat-label">This year</div><div class="stat-val">' + thisYear + '</div></div><div class="stat-card"><div class="stat-label">Tyler / Travis</div><div class="stat-val" style="font-size:17px">' + byTyler + ' / ' + byTravis + '</div></div>';
}

function renderCompleted() {
  const period = document.getElementById('comp-period').value;
  const owner = document.getElementById('comp-owner').value;
  const search = document.getElementById('comp-search').value.trim().toLowerCase();
  const monthInput = document.getElementById('comp-month');
  monthInput.style.display = period === 'custom' ? 'inline-block' : 'none';
  let filtered = completed.filter(c => {
    const d = new Date(c.completedAt);
    if (period === 'month' && !(d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear())) return false;
    if (period === 'year' && d.getFullYear() !== now.getFullYear()) return false;
    if (period === 'custom') { const mv = monthInput.value; if (mv) { const [y,m] = mv.split('-').map(Number); if (!(d.getFullYear() === y && d.getMonth() === m-1)) return false; } }
    if (owner !== 'all' && c.col !== owner) return false;
    if (search && !c.n.toLowerCase().includes(search)) return false;
    return true;
  }).sort((a,b) => new Date(b.completedAt) - new Date(a.completedAt));
  const content = document.getElementById('comp-content');
  if (!filtered.length) { content.innerHTML = '<div class="empty-comp">No completed projects match this filter.</div>'; return; }
  const rows = filtered.map(c => {
    const d = new Date(c.completedAt);
    const ds = MONTHS[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
    const ocls = c.col === 'tyler' ? 'ob-tyler' : c.col === 'travis' ? 'ob-travis' : 'ob-unassigned';
    const olbl = c.col === 'tyler' ? 'Tyler' : c.col === 'travis' ? 'Travis' : 'Unassigned';
    return '<tr><td>' + c.n + '</td><td>' + (c.dates||'—') + '</td><td>' + (c.size?'n='+c.size:'—') + '</td><td><span class="ob ' + ocls + '">' + olbl + '</span></td><td>' + ds + '</td><td><button class="restore-btn" data-id="' + c.id + '">Restore</button></td></tr>';
  }).join('');
  content.innerHTML = '<table class="comp-table"><thead><tr><th>Project</th><th>Dates</th><th>Size</th><th>Owner</th><th>Completed</th><th></th></tr></thead><tbody>' + rows + '</tbody></table>';
  content.querySelectorAll('.restore-btn').forEach(btn => {
    btn.addEventListener('click', () => { const item = completed.find(c => c.id == btn.dataset.id); if (item) { cards.push({...item, completedAt: undefined}); completed = completed.filter(c => c.id != btn.dataset.id); saveBin(); renderStats(); renderCompleted(); } });
  });
}

document.getElementById('add-btn').addEventListener('click', () => {
  const name = document.getElementById('new-name').value.trim(); if (!name) return;
  cards.push({id: nextId++, n: name, dates: document.getElementById('new-dates').value.trim()||'', size: document.getElementById('new-n').value.trim()||'', universe: '', col: 'unassigned'});
  document.getElementById('new-name').value = ''; document.getElementById('new-dates').value = ''; document.getElementById('new-n').value = '';
  saveBin(); renderBoard();
});
document.getElementById('new-name').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('add-btn').click(); });

function openImport() { document.getElementById('import-modal').classList.add('open'); }
function closeImport() { document.getElementById('import-modal').classList.remove('open'); document.getElementById('paste-area').value = ''; }
function parseRows(text) {
  const lines = text.trim().split('\n').filter(l => l.trim()); let added = 0;
  lines.forEach(line => {
    const cells = line.includes('\t') ? line.split('\t') : line.split(',');
    const clean = cells.map(c => c.trim().replace(/^"|"$/g, ''));
    const name = clean[0]; if (!name || /^(project|name|title)/i.test(name)) return;
    const start = clean[1]||'', end = clean[2]||'';
    const dates = start && end ? start + ' – ' + end : start||end||'';
    cards.push({id: nextId++, n: name, dates, size: clean[3]||'', universe: clean[4]||'', col: 'unassigned'}); added++;
  }); return added;
}
function doImport() {
  const text = document.getElementById('paste-area').value; if (!text.trim()) { closeImport(); return; }
  const added = parseRows(text); saveBin(); renderBoard(); closeImport();
  if (added > 0) alert('Imported ' + added + ' project' + (added !== 1 ? 's' : '') + ' to Unassigned.');
}
function handleFile(e) { const file = e.target.files[0]; if (!file) return; const r = new FileReader(); r.onload = ev => { document.getElementById('paste-area').value = ev.target.result; }; r.readAsText(file); }
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.style.background = '#f0ede8'; });
dz.addEventListener('dragleave', () => { dz.style.background = ''; });
dz.addEventListener('drop', e => { e.preventDefault(); dz.style.background = ''; const file = e.dataTransfer.files[0]; if (file) { const r = new FileReader(); r.onload = ev => { document.getElementById('paste-area').value = ev.target.result; }; r.readAsText(file); } });

init();
</script>
</body>
</html>
